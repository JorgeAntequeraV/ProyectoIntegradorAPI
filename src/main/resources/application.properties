spring.application.name=TFG
server.port=${PORT}

# --- Base de datos ---
spring.datasource.url=${DBURL}
spring.datasource.username=${DBUSER}
spring.datasource.password=${DBPASS}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=${DDLAUTO}
spring.jpa.show-sql=${SHOWSQL}
spring.jpa.properties.hibernate.format_sql=${FORMATSQL}
spring.jpa.properties.hibernate.dialect=${DIALECT}
spring.jpa.database-platform=${DB_DIALECT}

# --- JWT ---
jwt.secret=${JWTKEY}
jwt.expiration-ms=${JWTEXP}

# --- App ---
app.frontend.url=${FRONTURL}

# --- reCAPTCHA ---
recaptcha.secret=${RECAPTCHASECRET}
recaptcha.url=https://www.google.com/recaptcha/api/siteverify

# --- Google OAuth ---
# Lista separada por comas con los Client IDs aceptados (Android + Web).
google.oauth.client-ids=${GOOGLECLIENTIDS}

# --- Mail (Brevo SMTP) ---
spring.mail.host=${MAILHOST}
spring.mail.port=${MAILPORT}
spring.mail.username=${MAILUSER}
spring.mail.password=${MAILPASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Remitente que aparece en los emails
mail.from=${MAILFROM}
mail.from-name=${MAILFROMNAME}
